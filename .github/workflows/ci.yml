name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rcar
          POSTGRES_PASSWORD: rcar
          POSTGRES_DB: rcar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rcar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rcar:rcar@localhost:5432/rcar_test?schema=public
      RUN_DB_E2E: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Q10: Generate Prisma client before building so types are available
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter api exec prisma validate

      - name: Deploy Prisma migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Lint (API)
        run: pnpm --filter api lint

      - name: Build
        run: pnpm --filter api build

      - name: Unit tests (API)
        run: pnpm --filter api test

      - name: E2E tests (API)
        run: pnpm --filter api test:e2e

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

      - name: Unit tests
        run: pnpm --filter web test:unit

      - name: Install Playwright browser (Chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Happy-path E2E tests (Web)
        run: pnpm --filter web test:e2e

