name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to release/deploy (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string
      target_environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-and-package:
    name: Verify and Package
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Lint API
        run: pnpm --filter api lint

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web
        run: pnpm --filter web build

      - name: Unit tests (API)
        run: pnpm --filter api test

      - name: Unit tests (Web)
        run: pnpm --filter web test:unit

      - name: API E2E happy-path
        run: pnpm --filter api test:e2e

      - name: Install Playwright browser (Chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Web E2E happy-path
        run: pnpm --filter web test:e2e

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          if-no-files-found: error

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/web
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: verify-and-package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: release/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: release/web

      - name: Archive artifacts
        run: |
          tar -czf api-dist.tgz -C release api
          tar -czf web-dist.tgz -C release web

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            api-dist.tgz
            web-dist.tgz

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: verify-and-package
    if: github.event_name == 'push' || inputs.target_environment == 'staging' || inputs.target_environment == 'production'
    environment: staging

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: artifacts/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifacts/web

      - name: Deploy to staging (safe skip)
        env:
          STAGING_DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$STAGING_DEPLOY_HOOK_URL" ]; then
            echo "::notice::STAGING_DEPLOY_HOOK_URL is not configured. Skipping deploy."
            exit 0
          fi

          curl --fail --show-error --silent -X POST "$STAGING_DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' || inputs.target_environment == 'production'
    environment: production

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: artifacts/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifacts/web

      - name: Deploy to production (safe skip)
        env:
          PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "::notice::PRODUCTION_DEPLOY_HOOK_URL is not configured. Skipping deploy."
            exit 0
          fi

          curl --fail --show-error --silent -X POST "$PRODUCTION_DEPLOY_HOOK_URL"

