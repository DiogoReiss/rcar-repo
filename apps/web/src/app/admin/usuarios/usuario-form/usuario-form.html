<section class="page">
  <lync-page-header [title]="isEdit() ? 'Editar Usuário' : 'Novo Usuário'">
    <a class="btn-secondary" routerLink="/admin/usuarios">← Voltar</a>
  </lync-page-header>

  @if (error()) {
    <div class="error">{{ error() }}</div>
  }

  <div class="form-card">
    <form (ngSubmit)="onSubmit()" class="form-grid">
      <div class="form-field">
        <label for="nome">Nome</label>
        <input id="nome" type="text" [ngModel]="nome()" (ngModelChange)="nome.set($event)" name="nome" required />
      </div>

      <div class="form-field">
        <label for="email">E-mail</label>
        <input id="email" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
      </div>

      <div class="form-field">
        <label for="senha">{{ isEdit() ? 'Nova Senha (opcional)' : 'Senha' }}</label>
        <input id="senha" type="password" [ngModel]="senha()" (ngModelChange)="senha.set($event)" name="senha" [required]="!isEdit()" minlength="6" />
      </div>

      <div class="form-field">
        <label for="role">Perfil</label>
        <select id="role" [ngModel]="role()" (ngModelChange)="role.set($event)" name="role">
          <option value="OPERADOR">Operador</option>
          <option value="GESTOR_GERAL">Gestor Geral</option>
        </select>
      </div>

      @if (!isGestorGeral()) {
        <div class="form-field full">
          <label>Funcionalidades *</label>
          <div class="features-grid">
            @for (f of allFeatures; track f.value) {
              <label class="feature-checkbox">
                <input
                  type="checkbox"
                  [checked]="features().includes(f.value)"
                  (change)="toggleFeature(f.value)" />
                {{ f.label }}
              </label>
            }
          </div>
          @if (features().length === 0) {
            <span class="field-error">Selecione ao menos uma funcionalidade</span>
          }
        </div>
      }

      <div class="form-actions full">
        <button type="submit" class="btn-primary" [disabled]="loading() || (!isGestorGeral() && features().length === 0)">
          {{ loading() ? 'Salvando...' : 'Salvar' }}
        </button>
        <a class="btn-secondary" routerLink="/admin/usuarios">Cancelar</a>
      </div>
    </form>
  </div>
</section>
