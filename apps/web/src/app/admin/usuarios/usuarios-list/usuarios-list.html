<section class="page">
  <lync-page-header title="Usuários">
    <lync-btn label="+ Novo Usuário" (clicked)="openNew()" />
  </lync-page-header>

  @if (loading()) {
    <div class="loading">Carregando...</div>
  } @else {
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users(); track user.id) {
            <tr>
              <td>{{ user.nome }}</td>
              <td>{{ user.email }}</td>
              <td><span class="badge" [class]="'badge--' + user.role.toLowerCase()">{{ roleLabel(user.role) }}</span></td>
              <td><span class="badge" [class]="user.ativo ? 'badge--success' : 'badge--inactive'">{{ user.ativo ? 'Ativo' : 'Inativo' }}</span></td>
              <td class="actions">
                <button class="btn-sm" (click)="openEdit(user)">Editar</button>
                <button class="btn-sm btn-danger" (click)="onRemoveClick(user)" [disabled]="removing() === user.id">
                  {{ removing() === user.id ? '...' : 'Desativar' }}
                </button>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="5" class="empty">Nenhum usuário encontrado.</td></tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>

<lync-entity-dialog
  [title]="dialogTitle()"
  [visible]="dialogVisible()"
  [loading]="saving()"
  (submitted)="onDialogSave()"
  (cancelled)="closeDialog()"
  (visibleChange)="dialogVisible.set($event)"
>
  <div class="form-grid">
    <lync-form-field label="Nome" [required]="true">
      <input type="text" [ngModel]="fNome()" (ngModelChange)="fNome.set($event)" name="nome" required />
    </lync-form-field>
    <lync-form-field label="E-mail" [required]="true">
      <input type="email" [ngModel]="fEmail()" (ngModelChange)="fEmail.set($event)" name="email" required />
    </lync-form-field>
    <lync-form-field [label]="isEdit() ? 'Nova Senha (opcional)' : 'Senha'" [required]="!isEdit()">
      <input type="password" [ngModel]="fSenha()" (ngModelChange)="fSenha.set($event)" name="senha" [required]="!isEdit()" minlength="6" />
    </lync-form-field>
    <lync-form-field label="Perfil">
      <select [ngModel]="fRole()" (ngModelChange)="fRole.set($event)" name="role">
        <option value="OPERADOR">Operador</option>
        <option value="GESTOR_GERAL">Gestor Geral</option>
      </select>
    </lync-form-field>
  </div>
</lync-entity-dialog>

<lync-confirm-dialog
  [open]="!!confirmTarget()"
  [message]="'Desativar o usuário ' + (confirmTarget()?.nome ?? '') + '?'"
  confirmLabel="Desativar"
  (confirmed)="onConfirmRemove()"
  (cancelled)="onCancelRemove()"
  />
