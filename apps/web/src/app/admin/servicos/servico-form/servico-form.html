<section class="page">
  <lync-page-header [title]="isEdit() ? 'Editar Serviço' : 'Novo Serviço'">
    <a class="btn-secondary" routerLink="/admin/servicos">← Voltar</a>
  </lync-page-header>

  @if (error()) { <div class="error">{{ error() }}</div> }

  <div class="form-card">
    <form (ngSubmit)="onSubmit()" class="form-grid">
      <div class="form-field full">
        <label for="nome">Nome</label>
        <input id="nome" [ngModel]="nome()" (ngModelChange)="nome.set($event)" name="nome" required />
      </div>
      <div class="form-field full">
        <label for="descricao">Descrição (opcional)</label>
        <textarea id="descricao" [ngModel]="descricao()" (ngModelChange)="descricao.set($event)" name="descricao"></textarea>
      </div>
      <div class="form-field">
        <label for="preco">Preço (R$)</label>
        <input id="preco" type="number" min="0" step="0.01" [ngModel]="preco()" (ngModelChange)="preco.set(+$event)" name="preco" required />
      </div>
      <div class="form-field">
        <label for="duracaoMin">Duração (minutos)</label>
        <input id="duracaoMin" type="number" min="5" [ngModel]="duracaoMin()" (ngModelChange)="duracaoMin.set(+$event)" name="duracaoMin" required />
      </div>
      <div class="form-actions full">
        <button type="submit" class="btn-primary" [disabled]="loading()">{{ loading() ? 'Salvando...' : 'Salvar' }}</button>
        <a class="btn-secondary" routerLink="/admin/servicos">Cancelar</a>
      </div>
    </form>
  </div>
</section>
