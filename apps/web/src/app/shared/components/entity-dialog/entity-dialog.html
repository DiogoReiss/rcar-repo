<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [header]="title()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: wide() ? '680px' : '480px', maxWidth: '96vw' }"
  [breakpoints]="{ '768px': '96vw' }"
  (onHide)="close()"
>
  <div class="dialog-body">
    <ng-content />
  </div>

  <ng-template #footer>
    <div class="dialog-footer">
      <lync-btn label="Cancelar" variant="secondary" (clicked)="close()" [disabled]="loading()" />
      <lync-btn [label]="loading() ? 'Salvando…' : saveLabel()" [loading]="loading()" (clicked)="submitted.emit()" />
    </div>
  </ng-template>
</p-dialog>
