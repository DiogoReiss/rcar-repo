@if (open()) {
  <div class="confirm-overlay" (click)="cancelled.emit()">
    <div class="confirm-box" role="alertdialog" [attr.aria-label]="message()" (click)="$event.stopPropagation()">
      <p class="confirm-message">{{ message() }}</p>
      <div class="confirm-actions">
        <button type="button" class="btn-secondary" (click)="cancelled.emit()">
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          [class]="danger() ? 'btn-primary btn-danger-solid' : 'btn-primary'"
          (click)="confirmed.emit()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
