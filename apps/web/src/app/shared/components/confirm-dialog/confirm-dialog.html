<p-dialog
  [visible]="open()"
  (visibleChange)="!$event && cancelled.emit()"
  header="Confirmação"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '420px', maxWidth: '96vw' }"
>
  <p class="confirm-message">{{ message() }}</p>

  <ng-template pTemplate="footer">
    <div class="confirm-footer">
      <button type="button" class="btn-secondary" (click)="cancelled.emit()" [disabled]="loading()">
        {{ cancelLabel() }}
      </button>
      <button
        type="button"
        [class]="danger() ? 'btn-primary btn-danger-solid' : 'btn-primary'"
        (click)="confirmed.emit()"
        [disabled]="loading()"
      >
        @if (loading()) { … } @else { {{ confirmLabel() }} }
      </button>
    </div>
  </ng-template>
</p-dialog>
