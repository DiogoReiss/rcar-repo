<p-dialog
  [visible]="open()"
  (visibleChange)="!$event && cancelled.emit()"
  header="Confirmação"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '420px', maxWidth: '96vw' }"
>
  <p class="confirm-message">{{ message() }}</p>

  <ng-template pTemplate="footer">
    <div class="confirm-footer">
      <lync-btn [label]="cancelLabel()" variant="secondary" [disabled]="loading()" (clicked)="cancelled.emit()" />
      <lync-btn
        [label]="loading() ? '…' : confirmLabel()"
        [variant]="danger() ? 'danger' : 'primary'"
        [loading]="loading()"
        (clicked)="confirmed.emit()"
      />
    </div>
  </ng-template>
</p-dialog>
