<header class="header">
  <div class="header-left">
    <button
      type="button"
      class="toggle-btn"
      (click)="onToggle()"
      aria-label="Alternar menu lateral">
      <i class="pi pi-bars"></i>
    </button>
    <span class="header-title">RCar</span>
  </div>

  <div class="header-right">
    @if (currentUser(); as user) {
      <span class="user-name">{{ user.nome }}</span>
      <button type="button" class="logout-btn" (click)="logout()" aria-label="Sair">
        <i class="pi pi-sign-out"></i>
      </button>
    }
  </div>
</header>
