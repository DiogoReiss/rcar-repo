<section class="reset-page">
  <div class="reset-card">
    <header class="reset-header">
      <h1>Redefinir Senha</h1>
      <p>Informe sua nova senha</p>
    </header>

    @if (success()) {
      <div class="success-message" role="status">
        <p>Senha redefinida com sucesso!</p>
        <a routerLink="/auth/login">Ir para o login</a>
      </div>
    } @else {
      @if (error()) {
        <div class="error-message" role="alert">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="reset-form">
        <div class="form-field">
          <label for="novaSenha">Nova senha</label>
          <input
            id="novaSenha"
            type="password"
            [ngModel]="novaSenha()"
            (ngModelChange)="novaSenha.set($event)"
            name="novaSenha"
            placeholder="Mínimo 6 caracteres"
            required
            minlength="6"
            autocomplete="new-password"
          />
        </div>

        <div class="form-field">
          <label for="confirmarSenha">Confirmar senha</label>
          <input
            id="confirmarSenha"
            type="password"
            [ngModel]="confirmarSenha()"
            (ngModelChange)="confirmarSenha.set($event)"
            name="confirmarSenha"
            placeholder="Repita a nova senha"
            required
            minlength="6"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading() || !novaSenha() || !confirmarSenha()">
          @if (loading()) {
            Redefinindo...
          } @else {
            Redefinir Senha
          }
        </button>

        <a class="back-link" routerLink="/auth/login">Voltar ao login</a>
      </form>
    }
  </div>
</section>
