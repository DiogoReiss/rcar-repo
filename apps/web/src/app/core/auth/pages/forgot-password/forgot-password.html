<section class="forgot-page">
  <div class="forgot-card">
    <header class="forgot-header">
      <h1>Recuperar Senha</h1>
      <p>Informe seu e-mail para receber instruções de recuperação</p>
    </header>

    @if (success()) {
      <div class="success-message" role="status">
        <p>Instruções enviadas! Verifique seu e-mail.</p>
        <a routerLink="/auth/login">Voltar ao login</a>
      </div>
    } @else {
      @if (error()) {
        <div class="error-message" role="alert">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="forgot-form">
        <div class="form-field">
          <label for="email">E-mail</label>
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading() || !email()">
          @if (loading()) {
            Enviando...
          } @else {
            Enviar
          }
        </button>

        <a class="back-link" routerLink="/auth/login">Voltar ao login</a>
      </form>
    }
  </div>
</section>
