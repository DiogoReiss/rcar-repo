<section class="register-page">
  <div class="register-card">
    <header class="register-header">
      <h1>Criar Conta</h1>
      <p>Cadastre-se para continuar com sua reserva ou locação</p>
    </header>

    @if (error()) {
      <div class="register-error" role="alert">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-field">
        <label for="nome">Nome completo</label>
        <input
          id="nome"
          type="text"
          [ngModel]="nome()"
          (ngModelChange)="nome.set($event)"
          name="nome"
          placeholder="Seu nome"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-field">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-field">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          [ngModel]="senha()"
          (ngModelChange)="senha.set($event)"
          name="senha"
          placeholder="Mínimo 8 caracteres"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-field">
        <label for="confirmarSenha">Confirmar senha</label>
        <input
          id="confirmarSenha"
          type="password"
          [ngModel]="confirmarSenha()"
          (ngModelChange)="confirmarSenha.set($event)"
          name="confirmarSenha"
          placeholder="Repita a senha"
          required
          autocomplete="new-password"
        />
      </div>

      <button
        type="submit"
        class="btn-register"
        [disabled]="loading() || !nome() || !email() || !senha() || !confirmarSenha()"
      >
        @if (loading()) {
          Criando conta...
        } @else {
          Criar conta
        }
      </button>

      <div class="register-links">
        <a routerLink="/auth/login">Já tenho conta</a>
        <a routerLink="/">Voltar para a página inicial</a>
      </div>
    </form>
  </div>
</section>
